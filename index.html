<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="She Glows">
<meta name="theme-color" content="#0D0810">
<title>She Glows ✨</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600;700&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
<script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
<script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
<script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
html,body{background:#0D0810;font-family:'Outfit',sans-serif;color:#FDF0E8;min-height:100vh;-webkit-tap-highlight-color:transparent}
::-webkit-scrollbar{width:3px}::-webkit-scrollbar-thumb{background:#E8527A;border-radius:2px}
.serif{font-family:'Cormorant Garamond',serif}
.btn{border:none;border-radius:100px;cursor:pointer;font-family:'Outfit',sans-serif;font-weight:500;transition:all .2s;-webkit-appearance:none}
.primary{background:linear-gradient(135deg,#E8527A,#C9973A);color:#fff;padding:11px 22px;font-size:13px;box-shadow:0 4px 20px rgba(232,82,122,.3)}
.primary:active{transform:scale(.97)}
.primary:disabled{opacity:.5;cursor:default}
.ghost{background:transparent;border:1px solid #E8527A;color:#E8527A;padding:9px 18px;font-size:12px}
.ghost:active{background:#E8527A;color:#fff}
.soft{background:rgba(232,82,122,.1);color:#F4A0B8;border:1px solid rgba(232,82,122,.18);padding:8px 14px;font-size:12px}
.soft:active,.soft.on{background:#E8527A;color:#fff;border-color:#E8527A}
.card{background:#1E1420;border-radius:18px;border:1px solid rgba(220,100,150,.15);padding:20px}
.inp{width:100%;background:rgba(255,255,255,.05);border:1px solid rgba(220,100,150,.2);border-radius:12px;padding:11px 15px;color:#FDF0E8;font-size:13px;outline:none;transition:border .2s;font-family:'Outfit',sans-serif;-webkit-appearance:none}
.inp:focus{border-color:#E8527A}
.inp::placeholder{color:#7A5568}
.inp option{background:#1E1420}
.tag{display:inline-block;background:rgba(232,82,122,.1);color:#F4A0B8;border-radius:20px;padding:4px 12px;font-size:11px;margin:3px;cursor:pointer;border:1px solid transparent;transition:all .2s}
.tag:active{background:#E8527A;color:#fff}
.aout{background:linear-gradient(135deg,rgba(232,82,122,.07),rgba(184,160,212,.06));border:1px solid rgba(232,82,122,.15);border-radius:14px;padding:18px;margin-top:14px;line-height:1.75;font-size:13px;white-space:pre-wrap}
.pbar{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden}
.pfill{height:100%;border-radius:3px;background:linear-gradient(135deg,#E8527A,#C9973A);transition:width .6s}
.badge{display:inline-flex;align-items:center;gap:4px;background:rgba(201,151,58,.12);color:#C9973A;border:1px solid rgba(201,151,58,.25);border-radius:20px;padding:3px 10px;font-size:11px;font-weight:600}
.sh{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;background:linear-gradient(135deg,#E8527A,#C9973A);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;margin-bottom:6px}
.shim{animation:shim 1.5s infinite;background:linear-gradient(90deg,rgba(255,255,255,.03) 25%,rgba(232,82,122,.07) 50%,rgba(255,255,255,.03) 75%);background-size:200% 100%;border-radius:12px}
@keyframes shim{0%{background-position:200% 0}100%{background-position:-200% 0}}
.g2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.g3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.tabs{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:18px}
textarea.inp{resize:vertical;min-height:72px}
select.inp{cursor:pointer}
@media(max-width:640px){.g2{grid-template-columns:1fr}.g3{grid-template-columns:1fr 1fr}}
#root{min-height:100vh}
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

// ── Storage ──────────────────────────────────────────────────────
const DB_KEY = "sheglows_v2";
const loadDB = () => { try { return JSON.parse(localStorage.getItem(DB_KEY)) || {}; } catch { return {}; } };
const saveDB = (db) => { try { localStorage.setItem(DB_KEY, JSON.stringify(db)); } catch {} };

// ── AI ───────────────────────────────────────────────────────────
async function askClaude(msg, sys) {
  const key = (loadDB().apiKey || "").trim();
  if (!key) return "No API key set. Go to Settings in the menu to add your Anthropic API key.";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-iab": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1000, system: sys || "You are She Glows AI, a warm expert beauty and wellness coach. Explain everything step by step simply. Be encouraging and use emojis.", messages: [{ role: "user", content: msg }] })
    });
    const d = await res.json();
    if (d.error) return "AI error: " + d.error.message;
    return d.content?.[0]?.text || "Having trouble connecting. Try again!";
  } catch(e) { return "Could not reach AI. Check your connection and try again!"; }
}

async function askClaudePhoto(b64, prompt, sys) {
  const key = “sk-ant api03--_Qvjsd2J5xSATuBXvZzO205GBNXAQE2vyhuTYQ7GOPGyJJCmHTaFuPluad_g3WejTEMTfk5yy_7JJby1AWjhw-tBZYhQAA";
  if (!key) return "No API key set. Go to Settings in the menu to add your Anthropic API key.";
  const imgData = b64.includes(",") ? b64.split(",")[1] : b64;
  const mediaType = b64.includes("image/png") ? "image/png" : "image/jpeg";
  try {
    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json", "x-api-key": key, "anthropic-version": "2023-06-01", "anthropic-dangerous-direct-browser-iab": "true" },
      body: JSON.stringify({ model: "claude-sonnet-4-20250514", max_tokens: 1200, system: sys || "You are She Glows AI, a warm expert beauty and wellness coach.", messages: [{ role: "user", content: [{ type: "image", source: { type: "base64", media_type: mediaType, data: imgData } }, { type: "text", text: prompt }] }] })
    });
    const d = await res.json();
    if (d.error) return "AI error: " + d.error.message;
    return d.content?.[0]?.text || "Could not analyze photo. Try again!";
  } catch(e) { return "Could not analyze photo. Check your connection and try again!"; }
}

// ── Colors ───────────────────────────────────────────────────────
const R="#E8527A",G="#C9973A",BG="#0D0810",PANEL="#160E14",BORDER="rgba(220,100,150,.15)",CREAM="#FDF0E8",MUTED="#7A5568",MINT="#7DD3B0",LAV="#B8A0D4",BLUSH="#F4A0B8",GRAD="linear-gradient(135deg,#E8527A,#C9973A)";

function persistUser(u, setUser) {
  const db = loadDB();
  saveDB({ ...db, users: { ...(db.users||{}), [u.email]: u } });
  setUser(u);
}

// ── AIChat ───────────────────────────────────────────────────────
function AIChat({ sys, ph, init }) {
  const [q, setQ] = useState(init||"");
  const [ans, setAns] = useState("");
  const [busy, setBusy] = useState(false);
  const ran = useRef(false);
  async function go(p) {
    const txt = p||q; if(!txt.trim()) return;
    setBusy(true); setAns("");
    const r = await askClaude(txt, sys);
    setAns(r); setBusy(false);
  }
  useEffect(() => { if(init && !ran.current) { ran.current=true; go(init); } }, []);
  return (
    <div>
      <div style={{display:"flex",gap:8}}>
        <input className="inp" value={q} onChange={e=>setQ(e.target.value)} placeholder={ph||"Ask me anything..."} onKeyDown={e=>e.key==="Enter"&&go()} style={{flex:1}}/>
        <button className="btn primary" onClick={()=>go()} disabled={busy}>{busy?"...":"Ask"}</button>
      </div>
      {busy && <div className="shim" style={{height:60,marginTop:12}}/>}
      {ans && <div className="aout">{ans}</div>}
    </div>
  );
}

// ── Settings ─────────────────────────────────────────────────────
function Settings({ onClose }) {
  const db = loadDB();
  const [key, setKey] = useState(db.apiKey||"");
  const [saved, setSaved] = useState(false);
  function save() {
    saveDB({ ...loadDB(), apiKey: key.trim() });
    setSaved(true);
    setTimeout(()=>setSaved(false), 2000);
  }
  return (
    <div style={{position:"fixed",inset:0,zIndex:800,background:"rgba(0,0,0,.8)",display:"flex",alignItems:"center",justifyContent:"center",padding:20}}>
      <div className="card" style={{width:"100%",maxWidth:420,padding:28}}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
          <div className="sh" style={{marginBottom:0}}>Settings ⚙️</div>
          <button onClick={onClose} className="btn ghost" style={{padding:"6px 14px",fontSize:12}}>Close</button>
        </div>
        <div style={{marginBottom:20}}>
          <div style={{fontSize:13,color:G,fontWeight:600,marginBottom:8}}>🤖 Anthropic API Key</div>
          <p style={{fontSize:12,color:MUTED,marginBottom:12,lineHeight:1.7}}>To use the AI features, you need a free Anthropic API key. Get one free at <strong style={{color:BLUSH}}>platform.anthropic.com</strong> - click API Keys, create a key, and paste it here.</p>
          <input className="inp" type="password" placeholder="sk-ant-api03-..." value={key} onChange={e=>setKey(e.target.value)} style={{marginBottom:10}}/>
          <button className="btn primary" onClick={save} style={{width:"100%"}}>{saved?"Saved! ✅":"Save API Key"}</button>
        </div>
        <div style={{background:"rgba(125,211,176,.08)",border:"1px solid rgba(125,211,176,.2)",borderRadius:12,padding:14}}>
          <div style={{fontSize:12,color:MINT,fontWeight:600,marginBottom:6}}>How to get your free API key:</div>
          <div style={{fontSize:12,color:MUTED,lineHeight:1.8}}>
            1. Go to <strong style={{color:CREAM}}>platform.anthropic.com</strong><br/>
            2. Create a free account<br/>
            3. Click "API Keys" in the menu<br/>
            4. Click "Create Key"<br/>
            5. Copy and paste it above<br/>
            <br/>
            <strong style={{color:BLUSH}}>Cost: Pay as you go. $5 lasts months for personal use.</strong>
          </div>
        </div>
      </div>
    </div>
  );
}

// ── Auth ─────────────────────────────────────────────────────────
function Auth({ onLogin }) {
  const [mode, setMode] = useState("login");
  const [name, setName] = useState("");
  const [email, setEmail] = useState("");
  const [pass, setPass] = useState("");
  const [err, setErr] = useState("");
  function submit() {
    if(!email||!pass) return setErr("Please fill in all fields.");
    const db = loadDB();
    if(mode==="signup") {
      if(db.users?.[email]) return setErr("Email already registered.");
      const u = { name:name||email.split("@")[0], email, pass, created:Date.now(), weightLog:[], measureHistory:[], progressPhotos:[], goals:{}, habits:{}, journal:[], skinTracker:[], calLog:[], moodLog:[], fastLog:[] };
      saveDB({ ...db, users:{...(db.users||{}),[email]:u} });
      onLogin(u);
    } else {
      const u = db.users?.[email];
      if(!u||u.pass!==pass) return setErr("Email or password incorrect.");
      onLogin(u);
    }
  }
  return (
    <div style={{minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",background:BG,padding:20}}>
      <div style={{width:"100%",maxWidth:400}}>
        <div style={{textAlign:"center",marginBottom:36}}>
          <div style={{fontSize:52}}>✨</div>
          <h1 className="serif" style={{fontSize:48,background:GRAD,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>She Glows</h1>
          <p style={{color:MUTED,fontSize:13,marginTop:6}}>Beauty - Weight Loss - Wellness - Fashion</p>
        </div>
        <div className="card" style={{padding:30}}>
          <div style={{display:"flex",gap:8,marginBottom:22}}>
            <button onClick={()=>setMode("login")} className={"btn "+(mode==="login"?"primary":"ghost")} style={{flex:1}}>Sign In</button>
            <button onClick={()=>setMode("signup")} className={"btn "+(mode==="signup"?"primary":"ghost")} style={{flex:1}}>Create Account</button>
          </div>
          {mode==="signup" && <input className="inp" placeholder="Your name" value={name} onChange={e=>setName(e.target.value)} style={{marginBottom:10}}/>}
          <input className="inp" placeholder="Email" value={email} onChange={e=>setEmail(e.target.value)} style={{marginBottom:10}}/>
          <input className="inp" type="password" placeholder="Password" value={pass} onChange={e=>setPass(e.target.value)} style={{marginBottom:16}} onKeyDown={e=>e.key==="Enter"&&submit()}/>
          {err && <p style={{color:R,fontSize:12,marginBottom:12}}>⚠️ {err}</p>}
          <button className="btn primary" style={{width:"100%"}} onClick={submit}>{mode==="login"?"Let's Glow ✨":"Start My Glow-Up 🌟"}</button>
          <p style={{fontSize:11,color:MUTED,textAlign:"center",marginTop:14,lineHeight:1.6}}>Your account is saved on this device. No email verification needed.</p>
        </div>
      </div>
    </div>
  );
}

// ── Dashboard ────────────────────────────────────────────────────
function Dashboard({ user, setUser }) {
  const save = u => persistUser(u, setUser);
  const [quote, setQuote] = useState("Loading your daily inspiration... ✨");
  const [mood, setMood] = useState("");
  useEffect(() => {
    askClaude("Give "+user.name+" one powerful glow-up motivation quote for today. Just the quote, nothing else.", "You are a beauty and wellness motivational coach. Give SHORT powerful quotes only.").then(setQuote);
  }, []);
  const log=user.weightLog||[], last=log[log.length-1], start=log[0];
  const lost = start&&last ? Math.max(0,parseFloat(start.w)-parseFloat(last.w)).toFixed(1) : null;
  const goal = user.goals?.targetWeight;
  const toGo = goal&&last ? Math.max(0,parseFloat(last.w)-parseFloat(goal)).toFixed(1) : null;
  const pct = goal&&start&&last&&parseFloat(start.w)!==parseFloat(goal) ? Math.min(100,Math.round(((parseFloat(start.w)-parseFloat(last.w))/(parseFloat(start.w)-parseFloat(goal)))*100)) : 0;
  const moods = ["😊 Great","😐 Okay","😔 Low","😤 Stressed","🔥 Motivated","😴 Tired"];
  function logMood(m) { setMood(m); save({...user,moodLog:[...(user.moodLog||[]),{mood:m,date:new Date().toLocaleDateString(),ts:Date.now()}]}); }
  const today = new Date().toLocaleDateString();
  const todayCals = (user.calLog||[]).filter(c=>c.date===today).reduce((s,c)=>s+(c.cal||0),0);
  return (
    <div>
      <div style={{marginBottom:22}}>
        <h2 className="sh">Welcome back, {user.name} 💕</h2>
        <p style={{color:MUTED,fontStyle:"italic",fontSize:13,lineHeight:1.5}}>{quote}</p>
      </div>
      <div className="card" style={{marginBottom:14}}>
        <div style={{fontSize:12,color:G,fontWeight:600,marginBottom:10}}>✨ How are you feeling today?</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:6}}>{moods.map(m=><button key={m} onClick={()=>logMood(m)} className={"btn soft"+(mood===m?" on":"")}>{m}</button>)}</div>
      </div>
      <div className="g2" style={{marginBottom:14}}>
        <div className="card" style={{background:"linear-gradient(135deg,rgba(232,82,122,.12),rgba(201,151,58,.06))"}}>
          <div style={{fontSize:24}}>⚖️</div>
          <div style={{fontSize:22,fontWeight:700,color:R,marginTop:6}}>{last?.w||"--"} <span style={{fontSize:12}}>lbs</span></div>
          <div style={{color:MUTED,fontSize:11}}>Current Weight</div>
          {lost>0 && <div className="badge" style={{marginTop:8}}>🔥 -{lost} lbs lost!</div>}
        </div>
        <div className="card">
          <div style={{fontSize:24}}>🎯</div>
          <div style={{fontSize:22,fontWeight:700,color:G,marginTop:6}}>{goal||"--"} <span style={{fontSize:12}}>lbs</span></div>
          <div style={{color:MUTED,fontSize:11}}>Goal Weight</div>
          {toGo>0 && <div style={{color:BLUSH,fontSize:11,marginTop:4}}>{toGo} lbs to go</div>}
        </div>
      </div>
      {goal&&start&&<div className="card" style={{marginBottom:14}}>
        <div style={{display:"flex",justifyContent:"space-between",fontSize:12,marginBottom:8}}><span style={{color:MUTED}}>Journey Progress</span><span style={{color:R,fontWeight:600}}>{pct}%</span></div>
        <div className="pbar"><div className="pfill" style={{width:pct+"%"}}/></div>
      </div>}
      <div className="g3" style={{marginBottom:14}}>
        {[["💧","Water",user.goals?.water||"--","cups"],["🍽️","Calories",todayCals+"/"+(user.goals?.calories||"?"),"today"],["💊","Protein",user.goals?.protein||"--","g/day"],["🏃","Steps",user.goals?.steps||"--","goal"],["😴","Sleep",user.goals?.sleep||"--","hrs"],["🌸","Mood",mood||"--","today"]].map(([e,l,v,s])=>(
          <div key={l} style={{background:"rgba(255,255,255,.03)",borderRadius:12,padding:10,textAlign:"center",border:"1px solid "+BORDER}}>
            <div style={{fontSize:18}}>{e}</div><div style={{fontSize:10,color:MUTED,marginTop:2}}>{l}</div>
            <div style={{fontSize:12,fontWeight:600,color:CREAM}}>{v}</div><div style={{fontSize:10,color:MUTED}}>{s}</div>
          </div>
        ))}
      </div>
      <div className="card"><div style={{fontSize:12,color:G,fontWeight:600,marginBottom:12}}>🤖 AI Daily Glow Advisor</div><AIChat sys="You are a warm daily beauty and wellness coach. Give personalized specific daily tips. Be encouraging and brief." ph="Tell me how you are feeling or what you need help with today..."/></div>
    </div>
  );
}

// ── WeightLoss ───────────────────────────────────────────────────
function WeightLoss({ user, setUser }) {
  const save = u => persistUser(u, setUser);
  const [tab, setTab] = useState("log");
  const TABS=[["log","📝 Weight Log"],["goals","🎯 Goals"],["calories","🍽️ Calories"],["meal","🥗 Meal Plans"],["workout","💪 Workouts"],["fasting","⏱️ Fasting"],["macros","📊 Macros"],["habits","✅ Habits"],["predict","🔮 Predictor"],["emotional","💭 Emotional"],["ai","🤖 AI Coach"]];
  const [w,setW]=useState(""), [wNote,setWNote]=useState(""), [calFood,setCalFood]=useState(""), [cal,setCal]=useState("");
  const [fastStart,setFastStart]=useState(user.fastStart||null);
  const log=user.weightLog||[], last=log[log.length-1], start=log[0];
  const today=new Date().toLocaleDateString();
  const todayCals=(user.calLog||[]).filter(c=>c.date===today).reduce((s,c)=>s+(c.cal||0),0);
  function logW(){if(!w)return;save({...user,weightLog:[...log,{w,note:wNote,date:today,ts:Date.now()}]});setW("");setWNote("");}
  function logCal(){if(!cal||!calFood)return;save({...user,calLog:[...(user.calLog||[]),{food:calFood,cal:parseInt(cal),date:today,ts:Date.now()}]});setCal("");setCalFood("");}
  function toggleHabit(h){const key=today+"|"+h;const hd=user.habits||{};save({...user,habits:{...hd,[key]:!hd[key]}});}
  function toggleFast(){if(fastStart){const dur=Math.round((Date.now()-fastStart)/360000)/10;save({...user,fastStart:null,fastLog:[...(user.fastLog||[]),{hours:dur,date:today}]});setFastStart(null);}else{const now=Date.now();setFastStart(now);save({...user,fastStart:now});}}
  function saveGoals(e){e.preventDefault();const fd=new FormData(e.target);const g={};for(let[k,v]of fd.entries())g[k]=v;save({...user,goals:{...user.goals,...g}});alert("Goals saved! 🎯");}
  const habits=["💧 Drink water","🥗 Eat veggies","🏃 Exercise","😴 Sleep 7+ hrs","🧘 Meditate","📝 Log food","⚖️ Weigh in","🚶 10k steps"];
  const dietStr=user.goals?.diet||"general", actStr=user.goals?.activity||"moderate", goalStr=user.goals?.targetWeight||"?";
  return (
    <div>
      <h2 className="sh">Weight Loss Journey ⚖️</h2>
      <div className="tabs">{TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={"btn soft"+(tab===k?" on":"")}>{l}</button>)}</div>
      {tab==="log"&&<div>
        <div className="card" style={{marginBottom:14}}>
          <div style={{fontSize:12,color:G,fontWeight:600,marginBottom:12}}>📝 Log Today's Weight</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}><input className="inp" placeholder="Weight (lbs)" value={w} onChange={e=>setW(e.target.value)} type="number" style={{flex:1}}/><button className="btn primary" onClick={logW}>Log</button></div>
          <input className="inp" placeholder="How do you feel? (optional)" value={wNote} onChange={e=>setWNote(e.target.value)}/>
        </div>
        {log.length>0&&<div className="card"><div style={{fontSize:12,color:G,fontWeight:600,marginBottom:12}}>📊 Weight History</div>{[...log].reverse().slice(0,20).map((e,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"8px 0",borderBottom:"1px solid rgba(255,255,255,.05)",fontSize:13}}><span style={{fontWeight:600}}>{e.w} lbs</span><span style={{color:MUTED,fontSize:11}}>{e.date}</span>{e.note&&<span style={{color:BLUSH,fontSize:11,fontStyle:"italic"}}>{e.note}</span>}</div>)}</div>}
      </div>}

    const prompts={
      outfit:"Based on my photo and body shape, describe in vivid detail how this outfit would look on me: "+item+". Cover fit, what looks great, what to watch for, styling tips, and where to buy cheap.",
      hair:"I want to try this hairstyle: "+item+". Based on my face shape and features, would it be flattering? What would look amazing, what to tell a stylist, any modifications for my face?",
      makeup:"I want to see how this makeup look would look on me: "+item+". Based on my features, describe how each element appears on my face, what would be most flattering, and give a step-by-step tutorial.",
      glasses:"I want to try these frames: "+item+". Based on my face shape in the photo, would they flatter me? Why or why not? Give detailed alternatives."
    };
    const r=await askClaudePhoto(photo,prompts[tab],"You are a virtual stylist. Give a detailed, vivid, encouraging assessment. Be specific about features. Always be body-positive.");
    setResult(r);setBusy(false);
  }
  return (
    <div>
      <h2 className="sh">Virtual Try-On ✨</h2>
      <p style={{color:MUTED,fontSize:13,marginBottom:16}}>Upload your photo and try on outfits, hairstyles, makeup, and glasses before you commit!</p>
      <div className="tabs">{TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={"btn soft"+(tab===k?" on":"")}>{l}</button>)}</div>
      <div className="card" style={{marginBottom:14}}><div style={{fontSize:12,color:G,fontWeight:600,marginBottom:8}}>📸 Your Photo</div><input type="file" accept="image/*" className="inp" style={{marginBottom:10}} onChange={e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>setPhoto(ev.target.result);r.readAsDataURL(f);}}/>{photo&&<img src={photo} alt="You" style={{width:"100%",maxHeight:260,objectFit:"contain",borderRadius:12}}/>}</div>
      <div className="card">
        <div style={{fontSize:12,color:G,fontWeight:600,marginBottom:8}}>{tab==="outfit"?"👗 Describe the Outfit":tab==="hair"?"💇 Describe the Hairstyle":tab==="makeup"?"💄 Describe the Makeup Look":"👓 Describe the Frames"}</div>
        <textarea className="inp" placeholder={tab==="outfit"?"e.g. High-waist wide-leg jeans, white crop blazer, nude heels":tab==="hair"?"e.g. Long beach waves with honey blonde balayage, curtain bangs":tab==="makeup"?"e.g. Soft glam: champagne lid, soft wing, peach lip, dewy skin":"e.g. Oversized tortoiseshell cat-eye frames"} value={item} onChange={e=>setItem(e.target.value)} style={{marginBottom:12}}/>
        <button className="btn primary" onClick={go} disabled={busy} style={{width:"100%"}}>{busy?"Styling you... ✨":"Try It On! ✨"}</button>
        {result&&<div className="aout">{result}</div>}
      </div>
    </div>
  );
}

// ── Wellness ─────────────────────────────────────────────────────
function Wellness({ user, setUser }) {

        {(user.journal||[]).length>0&&<div className="card" style={{marginBottom:14}}><div style={{fontSize:12,color:G,fontWeight:600,marginBottom:10}}>Past Entries</div>{[...(user.journal||[])].reverse().slice(0,8).map((j,i)=><div key={i} style={{padding:"9px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}><div style={{fontSize:11,color:MUTED,marginBottom:3}}>{j.date}</div><div style={{fontSize:13,color:CREAM,lineHeight:1.6}}>{j.entry}</div></div>)}</div>}

      {tab==="stress"&&<div className="card"><AIChat sys="You are a stress management coach. Give practical immediately usable stress relief techniques - breathing, grounding, quick routines. Explain how stress affects weight, skin, and beauty." ph="Tell me about your stress - I will give you immediate relief techniques and long-term strategies!"/></div>}
      {tab==="hormone"&&<div className="card"><AIChat sys="You are a women's hormone health specialist. Explain how hormones (estrogen, progesterone, cortisol, insulin, thyroid) affect weight, skin, hair, mood, and energy. Give practical lifestyle, diet, and supplement guidance. Always recommend seeing a doctor for serious concerns." ph="Tell me your symptoms - weight gain, skin changes, mood swings, fatigue - I will explain the hormone connection!"/></div>}
      {tab==="meditation"&&<div className="card"><AIChat sys="You are a meditation teacher. Lead guided meditations, breathing exercises, body scans, and visualizations. Include quick 2-minute AND longer 15-minute sessions. Be calming and guiding." ph="What kind of meditation do you need? (anxiety relief, sleep, confidence, focus, gratitude)"/></div>}
    </div>
  );
}

// ── Community ────────────────────────────────────────────────────
function Community({ user, setUser }) {
  const save = u => persistUser(u, setUser);
  const [tab, setTab] = useState("feed");
  const [post, setPost] = useState("");
  const TABS=[["feed","🌸 Feed"],["challenges","🏆 Challenges"],["tips","💡 Tips"],["accountability","👯 Accountability"]];
  const db=loadDB(), allPosts=db.communityPosts||[];
  function addPost(){if(!post.trim())return;const p={user:user.name,text:post,date:new Date().toLocaleDateString(),ts:Date.now()};const updated=[p,...allPosts];saveDB({...db,communityPosts:updated});setPost("");save({...user,lastPostTs:Date.now()});}
  const challenges=[{n:"30-Day Glow Challenge",d:"Skincare + 64oz water + 7hr sleep",e:"✨"},{n:"10-Pound Challenge",d:"Lose 10lbs in 30 days with daily check-ins",e:"⚖️"},{n:"No-Buy Beauty Month",d:"Use only what you have for 30 days",e:"💰"},{n:"Nail Growth Challenge",d:"Daily cuticle oil, no picking, 30 days",e:"💅"},{n:"Style Remix Challenge",d:"No new clothes - remix your closet 30 days",e:"👗"},{n:"Self-Love Challenge",d:"One compliment to yourself daily for 21 days",e:"💕"}];
  return (
    <div>
      <h2 className="sh">Community 🌸</h2>
      <div className="tabs">{TABS.map(([k,l])=><button key={k} onClick={()=>setTab(k)} className={"btn soft"+(tab===k?" on":"")}>{l}</button>)}</div>
      {tab==="feed"&&<div>
        <div className="card" style={{marginBottom:14}}><div style={{fontSize:12,color:G,fontWeight:600,marginBottom:10}}>✍️ Share with the Community</div><textarea className="inp" placeholder="Share your progress, tips, questions, or encouragement..." value={post} onChange={e=>setPost(e.target.value)} style={{marginBottom:10}}/><button className="btn primary" onClick={addPost}>Post 💕</button></div>
        {allPosts.length===0?<div className="card"><p style={{color:MUTED,fontSize:13}}>Be the first to post! 💕</p></div>:allPosts.slice(0,20).map((p,i)=><div key={i} className="card" style={{marginBottom:10}}><div style={{display:"flex",justifyContent:"space-between",marginBottom:8}}><span style={{fontSize:13,fontWeight:600,color:R}}>{p.user}</span><span style={{fontSize:11,color:MUTED}}>{p.date}</span></div><p style={{fontSize:13,color:CREAM,lineHeight:1.6}}>{p.text}</p></div>)}
      </div>}
      {tab==="challenges"&&<div className="g2">{challenges.map(c=><div key={c.n} className="card"><div style={{fontSize:26,marginBottom:8}}>{c.e}</div><div style={{fontSize:13,fontWeight:600,color:CREAM,marginBottom:4}}>{c.n}</div><div style={{fontSize:11,color:MUTED,marginBottom:12}}>{c.d}</div><button className="btn soft" style={{fontSize:11}}>Join Challenge</button></div>)}</div>}

// ── App Shell ────────────────────────────────────────────────────
const SCREENS=[
  {id:"dashboard",label:"Home",emoji:"🏠",Comp:Dashboard},
  {id:"weight",label:"Weight Loss",emoji:"⚖️",Comp:WeightLoss},
  {id:"beauty",label:"Beauty",emoji:"💄",Comp:Beauty},
  {id:"nails",label:"Nails",emoji:"💅",Comp:Nails},
  {id:"fashion",label:"Fashion",emoji:"👗",Comp:Fashion},
  {id:"body",label:"Body Tracker",emoji:"📏",Comp:BodyTracker},
  {id:"skin",label:"Skin Tracker",emoji:"🔬",Comp:SkinTracker},
  {id:"tryon",label:"Try-On",emoji:"✨",Comp:TryOn},
  {id:"wellness",label:"Wellness",emoji:"🌸",Comp:Wellness},
  {id:"glowup",label:"Glow-Up",emoji:"🌟",Comp:GlowUp},
  {id:"community",label:"Community",emoji:"👯",Comp:Community},
  {id:"services",label:"Services",emoji:"💆",Comp:Services},
];

function App() {
  const [user, setUser] = useState(null);
  const [screen, setScreen] = useState("dashboard");
  const [menuOpen, setMenuOpen] = useState(false);
  const [showSettings, setShowSettings] = useState(false);

  useEffect(() => {
    const db = loadDB();
    if(db.lastUser && db.users?.[db.lastUser]) setUser(db.users[db.lastUser]);
  }, []);

  function handleLogin(u) { const db=loadDB(); saveDB({...db,lastUser:u.email}); setUser(u); }
  function logout() { const db=loadDB(); saveDB({...db,lastUser:null}); setUser(null); setScreen("dashboard"); }

  if(!user) return <Auth onLogin={handleLogin}/>;

  const active = SCREENS.find(s=>s.id===screen)||SCREENS[0];
  const {Comp} = active;

  return (
    <div>
      {showSettings && <Settings onClose={()=>setShowSettings(false)}/>}
      <div style={{position:"fixed",top:0,left:0,right:0,zIndex:500,background:PANEL,padding:"11px 16px",borderBottom:"1px solid "+BORDER,display:"flex",alignItems:"center",justifyContent:"space-between"}}>
        <div className="serif" style={{fontSize:20,background:GRAD,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",fontWeight:700}}>She Glows ✨</div>
        <button onClick={()=>setMenuOpen(p=>!p)} className="btn ghost" style={{padding:"6px 14px",fontSize:12}}>☰ Menu</button>
      </div>
      {menuOpen&&(
        <div style={{position:"fixed",inset:0,zIndex:600,background:"rgba(0,0,0,.65)"}} onClick={()=>setMenuOpen(false)}>
          <div style={{position:"absolute",left:0,top:0,bottom:0,width:240,background:PANEL,padding:"16px 10px",overflowY:"auto",borderRight:"1px solid "+BORDER}} onClick={e=>e.stopPropagation()}>
            <div className="serif" style={{fontSize:22,background:GRAD,WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",textAlign:"center",marginBottom:8}}>She Glows ✨</div>
            <div style={{fontSize:11,color:MUTED,textAlign:"center",marginBottom:16}}>Hi, {user.name} 💕</div>
            {SCREENS.map(s=>(
              <div key={s.id} onClick={()=>{setScreen(s.id);setMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",borderRadius:10,cursor:"pointer",color:screen===s.id?R:MUTED,fontSize:13,fontWeight:screen===s.id?600:400,background:screen===s.id?"rgba(232,82,122,.12)":"transparent",marginBottom:2}}>
                <span style={{fontSize:15}}>{s.emoji}</span><span>{s.label}</span>
              </div>
            ))}
            <div onClick={()=>{setShowSettings(true);setMenuOpen(false);}} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",cursor:"pointer",color:MUTED,fontSize:13,marginTop:8,borderTop:"1px solid "+BORDER,paddingTop:16}}>
              <span>⚙️</span><span>Settings / API Key</span>
            </div>
            <div onClick={logout} style={{display:"flex",alignItems:"center",gap:9,padding:"10px 12px",cursor:"pointer",color:MUTED,fontSize:13}}>
              <span>🚪</span><span>Sign Out</span>
            </div>
          </div>
        </div>
      )}
      <div style={{paddingTop:58,paddingBottom:24,paddingLeft:16,paddingRight:16,maxWidth:760,margin:"0 auto",minHeight:"100vh"}}>
        <Comp user={user} setUser={setUser}/>
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
